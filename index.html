<!DOCTYPE html>

    <title>Slider-Tutorial</title>

<body>
    <section class="slider" id="landing">
        <h1>How To Slider:</h1>
        <section class="slider_a">  
            <input type="radio" name="slider" id="slider" value="one" checked>
            <input type="radio" name="slider" id="slider" value="two">
            <input type="radio" name="slider" id="slider" value="three">
            
            <div class="slider_a_wrapper">
                <div class="slider_a_element element_one"></div>
                <div class="slider_a_element element_two"></div>
                <div class="slider_a_element element_three"></div>
            </div>
        </section>
        
        <div class="scroll-indicator">
            <a href="#preview"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg></a>
        </div>
    </section>


<div class="scroll-indicator2">

        <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
    </svg></a>
</div>
